name = "cameronpcampbell/superproperties"
version = "0.1.0"
private = true
description = "A custom properties explorer."
authors = ["cameronpcampbell"]
license = "MIT"

[target]
environment = "roblox"

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_rojo", version = "^0.2.0", target = "lune" }
rojo = { name = "pesde/rojo", version = "^7.5.1", target = "lune" }

[dependencies]
fusion = { wally = "elttob/fusion", version = "0.3.0" }
supercorner = { name = "cameronpcampbell/supercorner_fusion03", version = "0.1.2" }
typeforge = { wally = "cameronpcampbell/typeforge", version = "3.0.4" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"
